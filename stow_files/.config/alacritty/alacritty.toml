[general]
live_config_reload = true
import = [
  "~/.config/alacritty/alacritty_colors.toml"
]

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true
semantic_escape_chars = ''',│`|:"' ()[]{}<>	'''

[window]
opacity = 1.0
title = "sid-local-xps"

[window.padding]
x = 5
y = 5

[keyboard]
bindings = [
  {key = "Space", mods = "Control", chars = "\u0000"},
  {action = "SpawnNewInstance", key = "Return", mods = "Super|Shift"},
  {chars = "\u001B[13;5u", key = "Return", mods = "Control"},
  {chars = "\u001B[32;2u", key = "Space", mods = "Shift"},
]

